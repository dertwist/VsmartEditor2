name: Build & Package

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VsmartEditor2-Windows
          path: dist/*.exe
          retention-days: 30

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VsmartEditor2-macOS
          path: dist/*.dmg
          retention-days: 30
