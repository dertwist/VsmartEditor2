<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartProp Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="app-menu-bar">
    <div class="menu-item" data-menu="file">File</div>
    <div class="menu-item" data-menu="edit">Edit</div>
    <div class="menu-item" data-menu="window">Window</div>
    <div class="menu-item" data-menu="help">Help</div>
  </div>
  <div class="menu-dropdown" id="menuFile">
    <div class="menu-dropdown-item" data-action="newDocument"><span class="menu-item-label"><span class="menu-icon" id="mi-new"></span>New</span><span class="shortcut">Ctrl+N</span></div>
    <div class="menu-sep"></div>
    <div class="menu-dropdown-item" data-action="importJSON"><span class="menu-item-label"><span class="menu-icon" id="mi-importjson"></span>Import JSON</span></div>
    <div class="menu-dropdown-item" data-action="importKV3"><span class="menu-item-label"><span class="menu-icon" id="mi-importkv3"></span>Import KV3</span></div>
    <div class="menu-sep"></div>
    <div class="menu-dropdown-item" data-action="exportJSON"><span class="menu-item-label"><span class="menu-icon" id="mi-exportjson"></span>Export JSON</span></div>
    <div class="menu-dropdown-item" data-action="exportKV3"><span class="menu-item-label"><span class="menu-icon" id="mi-exportkv3"></span>Export KV3</span></div>
    <div class="menu-sep"></div>
    <div class="menu-dropdown-item" data-action="quit"><span class="menu-item-label"><span class="menu-icon" id="mi-quit"></span>Quit</span></div>
  </div>
  <div class="menu-dropdown" id="menuEdit">
    <div class="menu-dropdown-item" data-action="addElement"><span class="menu-item-label"><span class="menu-icon" id="mi-addel"></span>Add Element</span><span class="shortcut">Ctrl+F</span></div>
    <div class="menu-dropdown-item" data-action="addVariable"><span class="menu-item-label"><span class="menu-icon" id="mi-addvar"></span>Add Variable</span></div>
    <div class="menu-sep"></div>
    <div class="menu-dropdown-item" data-action="undo"><span class="menu-item-label"><span class="menu-icon" id="mi-undo"></span>Undo</span><span class="shortcut">Ctrl+Z</span></div>
    <div class="menu-dropdown-item" data-action="redo"><span class="menu-item-label"><span class="menu-icon" id="mi-redo"></span>Redo</span><span class="shortcut">Ctrl+Shift+Z</span></div>
  </div>
  <div class="menu-dropdown" id="menuWindow">
    <div class="menu-dropdown-item" data-action="minimize"><span class="menu-item-label"><span class="menu-icon" id="mi-minimize"></span>Minimize</span></div>
    <div class="menu-dropdown-item" data-action="zoom"><span class="menu-item-label"><span class="menu-icon" id="mi-zoom"></span>Zoom</span></div>
    <div class="menu-dropdown-item" data-action="fullscreen"><span class="menu-item-label"><span class="menu-icon" id="mi-fullscreen"></span>Toggle Full Screen</span></div>
  </div>
  <div class="menu-dropdown" id="menuHelp">
    <div class="menu-dropdown-item" data-action="about"><span class="menu-item-label"><span class="menu-icon" id="mi-about"></span>About SmartProp Editor</span></div>
  </div>
  <div class="dock-container" id="dockContainer">
    <!-- Left: Hierarchy -->
    <div class="dock-panel panel" id="hierarchyPanel" style="width:280px;min-width:180px;border-right:1px solid var(--border-subtle);background:var(--bg-secondary)">
      <div class="dock-handle" data-dock-id="hierarchy">
        <span class="dock-handle-title">Hierarchy</span>
        <div class="dock-handle-actions">
          <button id="btnAddElement" title="Add Element (Ctrl+F)"></button>
          <button id="btnAddVariable" title="Add Variable"></button>
          <button id="tb-collapse" onclick="collapseAllTree()" title="Collapse All"></button>
          <button id="tb-expand" onclick="expandAllTree()" title="Expand All"></button>
          <button id="btnToggleModifiers" onclick="toggleShowModifiers()" title="Show/Hide Modifiers"></button>
          <button id="btnToggleCriteria" onclick="toggleShowCriteria()" title="Show/Hide Selection Criteria"></button>
          <button id="tb-undock-hierarchy" onclick="undockPanel('hierarchy')" title="Undock"></button>
        </div>
      </div>
      <div class="search-bar"><input type="text" id="treeSearch" placeholder="Search hierarchy..." oninput="filterTree(this.value)"></div>
      <div class="panel-body" id="treeContainer">
        <div class="tree" id="tree"></div>
      </div>
    </div>
    <div class="dock-resize-h" data-resize="hierarchy-props"></div>
    <!-- Center: Properties -->
    <div class="dock-panel panel" id="propsPanel" style="flex:1;min-width:200px;border-right:1px solid var(--border-subtle);background:var(--bg-secondary)">
      <div class="dock-handle" data-dock-id="properties">
        <span class="dock-handle-title">Properties</span>
        <div class="dock-handle-actions">
          <button id="tb-undock-properties" onclick="undockPanel('properties')" title="Undock"></button>
        </div>
      </div>
      <div class="panel-body" id="propsContainer">
        <div class="empty-state" id="propsEmpty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h4"/></svg><div>Select an item to edit</div></div>
      </div>
    </div>
    <div class="dock-resize-h" data-resize="props-preview"></div>
    <!-- Right: Undo History / JSON Edit / KV3 -->
    <div class="dock-panel panel" id="historyPanel" style="width:320px;min-width:200px;background:var(--bg-secondary)">
      <div class="dock-handle" data-dock-id="history">
        <span class="dock-handle-title">History</span>
        <div class="dock-handle-actions">
          <button id="tb-undock-history" onclick="undockPanel('history')" title="Undock"></button>
        </div>
      </div>
      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchTab(this,'historyTab')">History</button>
        <button class="panel-tab" onclick="switchTab(this,'jsonEdit')">JSON Edit</button>
        <button class="panel-tab" onclick="switchTab(this,'kv3Tab')">KV3</button>
      </div>
      <div class="tab-content active" id="historyTab">
        <div id="undoHistoryList" class="history-list"></div>
      </div>
      <div class="tab-content" id="jsonEdit"><textarea class="code-area" id="jsonEditor" spellcheck="false"></textarea><div style="padding:6px;flex-shrink:0;border-top:1px solid var(--border-subtle)"><button class="btn btn-sm btn-accent" onclick="applyJSONEdit()">Apply Changes</button></div></div>
      <div class="tab-content" id="kv3Tab"><textarea class="code-area" id="kv3Editor" spellcheck="false" readonly></textarea><div style="padding:6px;flex-shrink:0;border-top:1px solid var(--border-subtle);display:flex;gap:4px"><button class="btn btn-sm" onclick="copyKV3()">Copy KV3</button><button class="btn btn-sm btn-accent" onclick="applyKV3Edit()">Apply KV3</button></div></div>
    </div>
  </div>
  <div class="footer">
    <span id="statusBar">Ready</span>
    <span id="versionLabel">SmartProp Editor</span>
  </div>
</div>
<input type="file" id="fileInput" accept=".json,.vsmart,.vdata" style="display:none">
<script src="format/kv3.js"></script>
<script src="icons.js"></script>
<script>
// Inject SVG icons into static HTML elements after icons.js is loaded
document.addEventListener('DOMContentLoaded', function() {
  function setIcon(id, icon) {
    var el = document.getElementById(id);
    if (el && icon) el.innerHTML = icon;
  }
  // Toolbar buttons
  setIcon('btnAddElement',      ICONS.plusSquare);
  setIcon('btnAddVariable',     ICONS.tagPlus);
  setIcon('tb-collapse',        ICONS.collapseAll);
  setIcon('tb-expand',          ICONS.expandAll);
  setIcon('btnToggleModifiers', ICONS.sliders);
  setIcon('btnToggleCriteria',  ICONS.filter);
  setIcon('tb-undock-hierarchy',ICONS.undock);
  setIcon('tb-undock-properties',ICONS.undock);
  setIcon('tb-undock-history',  ICONS.undock);
  // File menu icons
  setIcon('mi-new',        ICONS.filePlus);
  setIcon('mi-importjson', ICONS.fileImport);
  setIcon('mi-importkv3',  ICONS.fileCode);
  setIcon('mi-exportjson', ICONS.fileExport);
  setIcon('mi-exportkv3',  ICONS.fileCode);
  setIcon('mi-quit',       ICONS.power);
  // Edit menu icons
  setIcon('mi-addel',  ICONS.nodeAdd);
  setIcon('mi-addvar', ICONS.variableAdd);
  setIcon('mi-undo',   ICONS.undo);
  setIcon('mi-redo',   ICONS.redo);
  // Window menu icons
  setIcon('mi-minimize',   ICONS.windowMinimize);
  setIcon('mi-zoom',       ICONS.windowMaximize);
  setIcon('mi-fullscreen', ICONS.fullscreen);
  // Help menu icon
  setIcon('mi-about', ICONS.info);
});
</script>
<script src="editor.js"></script>
</body>
</html>
